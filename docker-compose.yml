services:
  discord-bot:
    build: .
    container_name: mega-bot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=
      - PREFIX=-
      - COOLDOWN_MEDIA=60
      - LIMIT_FILESIZE_MB=200
      - DISK_CLEAR_MINUTES=5
    logging:
      driver: "json-file"
      options:
        max-size: "5mb"
        max-file: "1"
